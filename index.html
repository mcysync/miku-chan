<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Miku-Chan — Anime AI Website Builder</title>
    <meta name="description" content="Chat with Miku-Chan, an anime AI that builds full websites from a single prompt. Blue-and-pink starry aesthetic." />
    <meta name="author" content="Miku-Chan" />
    <meta property="og:title" content="Miku-Chan — Anime AI Website Builder" />
    <meta property="og:description" content="Describe a website. Miku-Chan builds it — code, styles, animations, everything." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="theme-color" content="#7dd3f6" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/jpeg" href="./assets/miku-chan.jpg" />
    <style>
      /* Fallback if built css not loaded */
      body { background: #0a0a1a; color: #fff; }
    </style>
  </head>
  <body>
    <div id="root">
      <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;font-family:Rajdhani,sans-serif;background:radial-gradient(ellipse at top left,rgba(85,51,255,0.35),transparent 55%),radial-gradient(ellipse at bottom right,rgba(255,100,150,0.35),transparent 55%),#0a0a1a;color:#fff;padding:20px;text-align:center">
        <img src="./assets/miku-chan.jpg" style="width:120px;height:120px;border-radius:50%;box-shadow:0 0 40px #7dd3f6" />
        <h1 style="font-family:Orbitron, sans-serif;background:linear-gradient(135deg,#7dd3f6,#ff7eb3);-webkit-background-clip:text;color:transparent;font-size:2rem;font-weight:900">MIKU-CHAN</h1>
        <p>Loading Miku-Chan... If this stays, GitHub Pages is serving static fallback.</p>
        <p style="font-size:12px;opacity:0.7">For full app, enable GitHub Actions Pages deployment. See README.</p>
        <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center">
          <a href="https://github.com/mcysync/miku-chan" style="background:#ff7eb3;color:#000;padding:8px 16px;border-radius:8px;text-decoration:none;font-weight:bold">GitHub</a>
          <a href="./docs/" style="border:1px solid #7dd3f6;color:#7dd3f6;padding:8px 16px;border-radius:8px;text-decoration:none">Try Static Build</a>
        </div>
        <div id="gh-pages-hint" style="font-size:11px;opacity:0.5;margin-top:20px"></div>
      </div>
    </div>
    <script>
      // Detect deployment type and redirect to working build
      const isGhPages = location.hostname.includes('github.io');
      const hasDocs = true;
      if (isGhPages && !location.pathname.includes('/docs/') && !location.pathname.includes('index.dev.html')) {
        // Try to load built version from docs/ if exists
        const docsIndex = './docs/index.html';
        document.getElementById('gh-pages-hint').textContent = 'GitHub Pages detected. If you see this loading screen, set Pages source to GitHub Actions (recommended) or to /docs folder.';
      }
    </script>
    <!-- Primary SPA entry for dev / Pages Actions build -->
    <script type="module" src="./pages-main.tsx"></script>
    <!-- Fallback for built GitHub Pages deployment -->
    <script>
      // If pages-main.tsx fails to load (because .tsx not served on Pages), load built bundle
      setTimeout(() => {
        const root = document.getElementById('root');
        if (root && root.innerHTML.includes('Loading Miku-Chan')) {
          console.log('Falling back to built assets');
          const s = document.createElement('script');
          s.type = 'module';
          s.src = './docs/assets/index-DUJ5Z_yO.js';
          s.onerror = () => {
            // Try miku-chan base path
            const s2 = document.createElement('script');
            s2.type = 'module';
            s2.src = '/miku-chan/assets/index-DUJ5Z_yO.js';
            document.body.appendChild(s2);
            const l = document.createElement('link');
            l.rel = 'stylesheet';
            l.href = '/miku-chan/assets/index-DGL3aLEh.css';
            document.head.appendChild(l);
          };
          document.body.appendChild(s);
          const l = document.createElement('link');
          l.rel = 'stylesheet';
          l.href = './docs/assets/index-DGL3aLEh.css';
          document.head.appendChild(l);
        }
      }, 1000);
    </script>
  </body>
</html>
